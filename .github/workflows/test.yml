name: Build and Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  # build.rs copies the bundled embedding model from here instead of hitting
  # HuggingFace, so the (cached) model is fetched at most once per runner.
  MIMIR_BUNDLED_MODEL_DIR: ${{ github.workspace }}/.model-cache

jobs:
  # Default build = bundled-embeddings (#237): this exercises the headline
  # zero-config dense-search path, including real inference in the embedding test.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: .model-cache
          key: minilm-l6-v2-qint8-v1
      - name: Fetch embedding model (if not cached)
        shell: bash
        run: |
          mkdir -p .model-cache
          base=https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/main
          [ -s .model-cache/model_qint8_avx512_vnni.onnx ] || curl -fL --retry 5 --retry-all-errors "$base/onnx/model_qint8_avx512_vnni.onnx" -o .model-cache/model_qint8_avx512_vnni.onnx
          [ -s .model-cache/tokenizer.json ] || curl -fL --retry 5 --retry-all-errors "$base/tokenizer.json" -o .model-cache/tokenizer.json
          # build.rs looks for these exact names:
          cp .model-cache/model_qint8_avx512_vnni.onnx .model-cache/model_quantized.onnx
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --verbose

  # All-platform first-class (#237): the bundled default must also build, LINK,
  # and run on Windows MSVC. The esaxx-rs/ort static-vs-dynamic-CRT link clash was
  # resolved by dropping tokenizers' esaxx_fast feature (#222), so this now works.
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: .model-cache
          key: minilm-l6-v2-qint8-v1
      - name: Fetch embedding model (if not cached)
        shell: bash
        run: |
          mkdir -p .model-cache
          base=https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/main
          [ -s .model-cache/model_qint8_avx512_vnni.onnx ] || curl -fL --retry 5 --retry-all-errors "$base/onnx/model_qint8_avx512_vnni.onnx" -o .model-cache/model_qint8_avx512_vnni.onnx
          [ -s .model-cache/tokenizer.json ] || curl -fL --retry 5 --retry-all-errors "$base/tokenizer.json" -o .model-cache/tokenizer.json
          cp .model-cache/model_qint8_avx512_vnni.onnx .model-cache/model_quantized.onnx
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --verbose

  # All-platform first-class (#237), cont'd: the bundled default must also build,
  # link, and run real inference on macOS (Apple Silicon). The `ort`
  # download-binaries feature ships a macOS aarch64 ONNX Runtime, and the int8
  # model runs on the CPU EP regardless of the avx512_vnni quantization name.
  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: .model-cache
          key: minilm-l6-v2-qint8-v1
      - name: Fetch embedding model (if not cached)
        shell: bash
        run: |
          mkdir -p .model-cache
          base=https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/main
          [ -s .model-cache/model_qint8_avx512_vnni.onnx ] || curl -fL --retry 5 --retry-all-errors "$base/onnx/model_qint8_avx512_vnni.onnx" -o .model-cache/model_qint8_avx512_vnni.onnx
          [ -s .model-cache/tokenizer.json ] || curl -fL --retry 5 --retry-all-errors "$base/tokenizer.json" -o .model-cache/tokenizer.json
          cp .model-cache/model_qint8_avx512_vnni.onnx .model-cache/model_quantized.onnx
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --verbose

  # Guard the default build on OLD glibc (#526): ubuntu-latest is 24.04
  # (glibc 2.39), so the `test` job can't catch it, but the prebuilt ONNX
  # Runtime that `ort` downloads is compiled against glibc >= 2.38 and
  # references the C23 `__isoc23_strto*` symbols. On Ubuntu 22.04 (glibc 2.35
  # — the dominant cloud/CI base image) the DEFAULT `cargo build` failed to
  # LINK until src/glibc_compat.rs added forwarding shims for those symbols.
  # Linking is the failure mode, and a debug build links too, so a plain
  # `cargo build` on an explicit 22.04 runner is the regression guard.
  default-build-glibc235:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: .model-cache
          key: minilm-l6-v2-qint8-v1
      - name: Fetch embedding model (if not cached)
        shell: bash
        run: |
          mkdir -p .model-cache
          base=https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/main
          [ -s .model-cache/model_qint8_avx512_vnni.onnx ] || curl -fL --retry 5 --retry-all-errors "$base/onnx/model_qint8_avx512_vnni.onnx" -o .model-cache/model_qint8_avx512_vnni.onnx
          [ -s .model-cache/tokenizer.json ] || curl -fL --retry 5 --retry-all-errors "$base/tokenizer.json" -o .model-cache/tokenizer.json
          cp .model-cache/model_qint8_avx512_vnni.onnx .model-cache/model_quantized.onnx
      - name: Confirm host glibc is < 2.38
        run: ldd --version | head -1
      - name: Build (default features, must link on glibc 2.35)
        run: cargo build --verbose

  # Guard the lean escape hatch: the binary must still build without the embedding
  # stack for size-sensitive / unsupported-platform users.
  lite-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build (no default features)
        run: cargo build --no-default-features --verbose
      - name: Test (no default features)
        run: cargo test --no-default-features --verbose

  # Guard the optional gRPC transport (#354): src/grpc.rs is entirely
  # feature-gated and was previously absent from every CI lane, so the whole
  # external wire surface shipped unverified. tonic-build invokes protoc at
  # build time, so install protobuf-compiler first. Built without default
  # features to isolate the grpc deps from the embedding stack and keep the
  # job fast; `cargo test` also runs the in-module unit tests for the
  # implemented RPCs and error sanitization.
  grpc-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Build (grpc, no embeddings)
        run: cargo build --no-default-features --features grpc --verbose
      - name: Test (grpc, no embeddings)
        run: cargo test --no-default-features --features grpc --verbose

  # Guard the optional multimodal document-extraction feature (#236): it pulls
  # zip + pdf-extract, so make sure it still builds and its tests pass. Built
  # without default features to isolate the multimodal deps from the embedding
  # stack and keep the job fast.
  multimodal-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build (multimodal, no embeddings)
        run: cargo build --no-default-features --features multimodal --verbose
      - name: Test (multimodal, no embeddings)
        run: cargo test --no-default-features --features multimodal multimodal --verbose
