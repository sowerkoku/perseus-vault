name: Smoke Test

on:
  push:
    branches: [main, ci/smoke-tests]
  pull_request:
    branches: [main]

env:
  # build.rs reads the bundled embedding model from here instead of hitting
  # HuggingFace (#649: an HF CDN 403 outage failed every uncached build job).
  MIMIR_BUNDLED_MODEL_DIR: ${{ github.workspace }}/.model-cache

jobs:
  demo-runs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: .model-cache
          key: minilm-l6-v2-qint8-v1
      - name: Fetch embedding model (if not cached)
        shell: bash
        run: |
          mkdir -p .model-cache
          base=https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/main
          [ -s .model-cache/model_qint8_avx512_vnni.onnx ] || curl -fL --retry 5 --retry-all-errors "$base/onnx/model_qint8_avx512_vnni.onnx" -o .model-cache/model_qint8_avx512_vnni.onnx
          [ -s .model-cache/tokenizer.json ] || curl -fL --retry 5 --retry-all-errors "$base/tokenizer.json" -o .model-cache/tokenizer.json
          cp .model-cache/model_qint8_avx512_vnni.onnx .model-cache/model_quantized.onnx
      - name: Build
        run: cargo build --locked
      - name: Smoke test — MCP stdio handshake against a fresh database
        run: |
          out=$(printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"smoke","version":"0"}}}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
            | ./target/debug/perseus-vault --db /tmp/smoke.db)
          echo "$out"
          echo "$out" | grep -q '"protocolVersion"' || { echo "initialize failed"; exit 1; }
          echo "$out" | grep -q 'mimir_remember' || { echo "tools/list missing mimir_remember"; exit 1; }
