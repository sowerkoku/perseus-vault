name: Scale gate

# #474: latency budgets enforced by benchmark/scale/gate.py.
#
# Two speeds:
#   - Fast gate at 10K on pushes to main (a 10K load + dense build + query
#     sweep is a few minutes).
#   - Weekly 100K run — a 100K bulk load currently takes ~4h (the O(N)-ish
#     per-write cost documented in report.json; #476 tracks the fix), which
#     fits the 6h job limit but has no business on every push.
# Budgets are per-size in gate.py (env-overridable here); the committed
# benchmark/scale/report.json documents the measured baselines + hardware.

on:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "benchmark/scale/**"
      - ".github/workflows/scale-gate.yml"
  schedule:
    - cron: "17 6 * * 1" # weekly 100K, Monday 06:17 UTC
  workflow_dispatch:
    inputs:
      size:
        description: "Corpus size to gate (10000 or 100000)"
        default: "100000"

env:
  CARGO_TERM_COLOR: always
  # build.rs reads the bundled embedding model from here instead of hitting
  # HuggingFace (#649: an HF CDN 403 outage failed every uncached build job).
  MIMIR_BUNDLED_MODEL_DIR: ${{ github.workspace }}/.model-cache

jobs:
  scale-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: .model-cache
          key: minilm-l6-v2-qint8-v1
      - name: Fetch embedding model (if not cached)
        shell: bash
        run: |
          mkdir -p .model-cache
          base=https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/main
          [ -s .model-cache/model_qint8_avx512_vnni.onnx ] || curl -fL --retry 5 --retry-all-errors "$base/onnx/model_qint8_avx512_vnni.onnx" -o .model-cache/model_qint8_avx512_vnni.onnx
          [ -s .model-cache/tokenizer.json ] || curl -fL --retry 5 --retry-all-errors "$base/tokenizer.json" -o .model-cache/tokenizer.json
          cp .model-cache/model_qint8_avx512_vnni.onnx .model-cache/model_quantized.onnx
      - name: Build (release, full — the dense path needs the embedding stack)
        run: cargo build --locked --release
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Scale gate
        env:
          # push = fast 10K; schedule = weekly 100K; dispatch = caller's choice
          SCALE_GATE_SIZE: ${{ github.event_name == 'schedule' && '100000' || github.event.inputs.size || '10000' }}
        run: python benchmark/scale/gate.py
