name: Scale gate

# #474: latency budgets enforced by benchmark/scale/gate.py.
#
# Two speeds:
#   - Fast gate at 10K on pushes to main (a 10K load + dense build + query
#     sweep is a few minutes).
#   - Weekly 100K run — a 100K bulk load currently takes ~4h (the O(N)-ish
#     per-write cost documented in report.json; #476 tracks the fix), which
#     fits the 6h job limit but has no business on every push.
# Budgets are per-size in gate.py (env-overridable here); the committed
# benchmark/scale/report.json documents the measured baselines + hardware.

on:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "benchmark/scale/**"
      - ".github/workflows/scale-gate.yml"
  schedule:
    - cron: "17 6 * * 1" # weekly 100K, Monday 06:17 UTC
  workflow_dispatch:
    inputs:
      size:
        description: "Corpus size to gate (10000 or 100000)"
        default: "100000"

env:
  CARGO_TERM_COLOR: always

jobs:
  scale-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build (release, full — the dense path needs the embedding stack)
        run: cargo build --release
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Scale gate
        env:
          # push = fast 10K; schedule = weekly 100K; dispatch = caller's choice
          SCALE_GATE_SIZE: ${{ github.event_name == 'schedule' && '100000' || github.event.inputs.size || '10000' }}
        run: python benchmark/scale/gate.py
