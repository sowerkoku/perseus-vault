name: Security Audit

# SECURITY.md states "cargo audit run in CI on every push" — this workflow makes
# that claim true. It scans the committed Cargo.lock against the RustSec advisory
# database on every push and PR, and weekly to catch newly-published advisories
# against already-pinned deps.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 7 * * 1"   # weekly (Mon 07:00 UTC)

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      # Vulnerabilities fail the build. Unmaintained/yanked advisories are
      # reported as warnings (not gating) so a transitive unmaintained crate
      # cannot block a security release; revisit the ignore list as they clear.
      #   RUSTSEC-2024-0436 — paste (unmaintained, proc-macro, compile-time only)
      #   RUSTSEC-2026-0192 — ttf-parser (unmaintained; only via opt-in multimodal)
      - name: cargo audit
        run: cargo audit --deny warnings --ignore RUSTSEC-2024-0436 --ignore RUSTSEC-2026-0192
