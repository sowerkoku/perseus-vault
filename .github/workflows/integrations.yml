name: Integrations

on:
  push:
    branches: [main, master]
    paths:
      - "integrations/**"
      - ".github/workflows/integrations.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "integrations/**"
      - ".github/workflows/integrations.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # The shared stdio-transport client. Pure stdlib; its real-binary
          # test self-skips when perseus-vault isn't on PATH.
          - adapter: client
            extra_deps: ""
          # autogen & crewai tests stub their framework deps — no install needed.
          - adapter: autogen
            extra_deps: ""
          - adapter: crewai
            extra_deps: ""
          # langgraph adapter imports langgraph.store.base at module load,
          # so the real package must be present to collect the tests.
          - adapter: langgraph
            extra_deps: "langgraph"
          # perseus-vault-persist imports mcp.server.streamable_http at module load and
          # pins the SDK version (the EventStore ABC signature is version-specific).
          - adapter: perseus-vault-persist
            extra_deps: "mcp==1.28.1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test deps
        run: pip install pytest pytest-asyncio ${{ matrix.extra_deps }}

      - name: Install perseus-vault-client (shared stdio transport)
        # The langgraph/crewai/autogen adapters import perseus_vault_client at
        # module load. It's a local path package (not published to PyPI), so it
        # must be installed from the repo. Harmless for adapters that don't use
        # it (e.g. perseus-vault-persist).
        run: pip install ./integrations/client

      - name: Run ${{ matrix.adapter }} adapter tests
        working-directory: integrations/${{ matrix.adapter }}
        run: python -m pytest tests/ -v
